<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
      //GitHub Pages SPA redirect
      var l = window.location;
      var newUrl = l.protocol + "//" + l.host + "/#"+ l.pathname + l.search + l.hash;
      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
