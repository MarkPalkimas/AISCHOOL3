<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>StudyGuideAI</title>

    <!-- KaTeX (for LaTeX math like $...$ and $$...$$) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      integrity="sha256-1kqB/kVJ5JcZ5ylYyYg7F4w8qZyq/7UMjkvX2kD4H+Q="
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
      integrity="sha256-bm5VqCzTqV8d3x3U3l7OzF7m5C2Q3f/4mCwZ6x9nQmQ="
      crossorigin="anonymous"
    ></script>

    <!-- Highlight.js (code blocks) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"
    ></script>

    <!-- Minimal utility styles (keeps your look, improves chat visuals) -->
    <style>
      :root {
        --bg: #ffffff;
        --card: #f8fafc;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --brand: #3b82f6;
        --bubble-user: #eef2ff;
        --bubble-ai: #f3f4f6;
        --radius: 16px;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      body {
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .hero-title {
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.1;
        font-weight: 800;
      }
      .hero-subtitle {
        color: var(--muted);
        font-size: clamp(14px, 2.5vw, 18px);
      }
      .btn-primary,
      .btn-secondary {
        border-radius: 999px;
        padding: 12px 16px;
        font-weight: 700;
        border: 1px solid transparent;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--brand);
        color: #fff;
      }
      .btn-primary:hover {
        filter: brightness(0.95);
      }
      .btn-secondary {
        background: #fff;
        border-color: var(--border);
      }
      .btn-secondary:hover {
        background: #f9fafb;
      }
      .feature-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .hover-card:hover {
        transform: translateY(-1px);
        transition: transform 0.15s ease;
      }
      .input {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        outline: none;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: grid;
        place-items: center;
        z-index: 50;
      }
      .modal-card {
        width: min(680px, 92vw);
        background: #fff;
        border-radius: 20px;
        padding: 24px;
        box-shadow: var(--shadow);
      }
      /* Chat specific */
      .chat-wrap {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }
      .msg .bubble {
        padding: 12px 14px;
        border-radius: 14px;
        max-width: 100%;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.user .bubble {
        background: var(--bubble-user);
      }
      .msg.ai .bubble {
        background: var(--bubble-ai);
      }
      .msg .who {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .msg .tools {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .pill {
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
        background: #fff;
      }
      .chat-input {
        display: flex;
        gap: 8px;
        position: sticky;
        bottom: 0;
        background: var(--bg);
      }
      .katex-block {
        overflow-x: auto;
      }
      .prose code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          'Liberation Mono', 'Courier New', monospace;
        background: #f9fafb;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 2px 5px;
      }
      .prose pre,
      pre.prose {
        background: #020617; /* terminal style */
        color: #e5e7eb;
        border: 1px solid #111827;
        border-radius: 10px;
        padding: 12px;
        overflow-x: auto;
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
